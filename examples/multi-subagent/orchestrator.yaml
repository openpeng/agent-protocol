tools:
  - name: glob
    type: builtin
  - name: bash
    type: builtin
  - name: write_file
    type: builtin

shared_context:
  report_path: "audit-report.md"

pipeline:
  # Step 1: Find all source files
  - step: find_files
    tool: glob
    args:
      pattern: "src/**/*.{ts,js}"
    output: file_list

  # Step 2: Count files
  - step: count_files
    tool: bash
    args:
      command: "echo '{{steps.find_files.output}}' | wc -w"
    output: file_count

  # Step 3: Run security subagent (parallel in future)
  - step: run_security
    tool: bash
    args:
      command: "agent-deploy run ./security --args file_list='{{steps.find_files.output}}'"
    output: security_report
    on_fail: continue

  # Step 4: Run performance subagent
  - step: run_performance
    tool: bash
    args:
      command: "agent-deploy run ./performance --args file_list='{{steps.find_files.output}}'"
    output: performance_report
    on_fail: continue

  # Step 5: Run quality subagent
  - step: run_quality
    tool: bash
    args:
      command: "agent-deploy run ./quality --args file_list='{{steps.find_files.output}}'"
    output: quality_report
    on_fail: continue

  # Step 6: Generate combined report
  - step: generate_report
    tool: write_file
    args:
      path: "{{shared_context.report_path}}"
      content: |
        # Code Audit Report

        **Date**: {{timestamp}}
        **Files Audited**: {{steps.file_count.output}}

        ---

        ## Security Analysis

        {{steps.run_security.output}}

        ---

        ## Performance Analysis

        {{steps.run_performance.output}}

        ---

        ## Code Quality Analysis

        {{steps.run_quality.output}}

        ---

        *Generated by Code Auditor v1.0.0*
